<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro.fun — Team Board</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --white:#fff;--bg:#F8F9FB;--bg2:#F1F3F7;--bg3:#E8ECF2;
  --border:#E2E6EE;--border2:#CDD3DF;
  --text:#0F1623;--text2:#5A6478;--text3:#A0AABB;
  --green:#0BA552;--green-bg:#EDFAF3;--green-bd:#A3E6C0;
  --blue:#1B6EF3;--blue-bg:#EEF4FF;--blue-bd:#B3CFFE;
  --purple:#6B47DC;--purple-bg:#F2EFFE;--purple-bd:#C4B3F7;
  --orange:#D4620A;--orange-bg:#FFF4EB;--orange-bd:#FFC89A;
  --red:#C5280C;--red-bg:#FFF0EE;--red-bd:#FFBDB5;
  --yellow:#92610A;--yellow-bg:#FFFBEB;--yellow-bd:#FFE099;
  --teal:#0A7B8C;--teal-bg:#EDFAFC;--teal-bd:#9FE3EC;
  --sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--r:8px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.09);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5}
.app{display:flex;flex-direction:column;min-height:100vh}

/* TOPBAR */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;height:52px;position:sticky;top:0;z-index:100;box-shadow:var(--sh);gap:8px}
.brand{display:flex;align-items:center;gap:8px;margin-right:16px;flex-shrink:0}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.brand-name{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.08em;text-transform:uppercase}
.nav{display:flex;gap:2px;flex:1}
.nav-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:6px;border:none;background:transparent;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-btn:hover{background:var(--bg);color:var(--text)}
.nav-btn.on{background:var(--bg2);color:var(--text);font-weight:600}
.nav-count{font-family:var(--mono);font-size:10px;background:var(--bg3);color:var(--text3);padding:1px 6px;border-radius:20px;min-width:20px;text-align:center}
.nav-btn.on .nav-count{background:var(--border2);color:var(--text2)}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}

/* SYNC + ONLINE */
.sync-row{display:flex;align-items:center;gap:6px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;transition:background .3s}
.sync-dot.syncing{animation:blink .6s infinite}
.sync-dot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.sync-label{font-family:var(--mono);font-size:10px;color:var(--text3)}
.online-wrap{display:flex;align-items:center;gap:5px}
.online-label{font-size:11px;color:var(--text3)}
.avatars{display:flex}
.av{width:24px;height:24px;border-radius:50%;color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;border:2px solid var(--white);margin-left:-5px;cursor:default;flex-shrink:0;transition:all .3s}
.av:first-child{margin-left:0}
.user-pill{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 10px}
.user-lbl{font-size:11px;color:var(--text3)}
.user-pill input{border:none;outline:none;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--text);background:transparent;width:90px}
.user-pill input::placeholder{color:var(--text3)}
.icon-btn{font-size:12px;font-weight:500;padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:var(--white);color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap}
.icon-btn:hover{border-color:var(--border2);color:var(--text)}

/* LOADING */
.loading{position:fixed;inset:0;background:rgba(248,249,251,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:10px;backdrop-filter:blur(2px)}
.loading.hide{display:none}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-family:var(--mono);font-size:12px;color:var(--text2)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;font-size:13px;padding:10px 16px;border-radius:8px;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* MAIN */
.main{flex:1;padding:24px 20px 60px;max-width:1060px;margin:0 auto;width:100%}
.view{display:none}.view.on{display:block}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:600;letter-spacing:-.02em;margin-bottom:2px}
.page-sub{font-size:13px;color:var(--text2)}
.head-right{display:flex;gap:8px;align-items:center;flex-shrink:0}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:16px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;box-shadow:var(--sh)}
.stat-v{font-size:22px;font-weight:600;letter-spacing:-.02em;line-height:1}
.stat-l{font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em}

/* FORM */
.add-form{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sh);display:none}
.add-form.open{display:block;animation:sd .2s ease}
@keyframes sd{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.fr{display:grid;gap:10px;margin-bottom:10px}
.fr.c2{grid-template-columns:1fr 1fr}
.fr.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.fg input,.fg textarea,.fg select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 10px;outline:none;transition:border-color .15s}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--border2);background:var(--white)}
.fg textarea{min-height:60px;resize:vertical;line-height:1.5}
.fg select{cursor:pointer}
.form-acts{display:flex;gap:8px;justify-content:flex-end}
.btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:7px 14px;border-radius:6px;border:1px solid var(--border);cursor:pointer;transition:all .12s}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}.btn-primary:hover{background:#1D2939}
.btn-ghost{background:var(--white);color:var(--text2)}.btn-ghost:hover{background:var(--bg2);color:var(--text)}

/* FILTER BAR */
.filter-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.fb{font-size:12px;font-weight:500;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--white);color:var(--text2);cursor:pointer;transition:all .12s}
.fb:hover{border-color:var(--border2);color:var(--text)}
.fb.on{background:var(--text);color:#fff;border-color:var(--text)}
.search-wrap{margin-left:auto;position:relative}
.search-wrap input{padding:5px 10px 5px 27px;border:1px solid var(--border);border-radius:6px;background:var(--white);font-family:var(--sans);font-size:12px;color:var(--text);outline:none;width:170px}
.search-wrap input:focus{border-color:var(--border2)}
.s-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text3);pointer-events:none}

/* ITEMS */
.items-list{display:flex;flex-direction:column;gap:6px}
.item-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;box-shadow:var(--sh);display:flex;align-items:flex-start;gap:12px;transition:border-color .15s;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.item-card:hover{border-color:var(--border2)}
.item-card.done-card{opacity:.5}.item-card.done-card .item-title{text-decoration:line-through;color:var(--text3)}
.il{flex:1;min-width:0}
.item-top{display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap}
.item-id{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0}
.item-title{font-size:14px;font-weight:500;flex:1;min-width:0}
.item-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:6px}
.item-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ir{display:flex;align-items:center;gap:5px;flex-shrink:0}
.item-check{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;flex-shrink:0;margin-top:1px}
.item-check.checked{background:var(--green);border-color:var(--green);color:#fff}
.item-del{width:26px;height:26px;border-radius:5px;border:1px solid transparent;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);transition:all .12s}
.item-del:hover{background:var(--red-bg);color:var(--red)}
.isel{font-size:11px;border:1px solid var(--border);border-radius:5px;padding:3px 6px;background:var(--bg);color:var(--text2);cursor:pointer;outline:none}
.isel:hover{border-color:var(--border2)}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 7px;border-radius:20px;border:1px solid;white-space:nowrap;flex-shrink:0}
.p-critical{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.p-high{background:var(--orange-bg);color:var(--orange);border-color:var(--orange-bd)}
.p-medium{background:var(--yellow-bg);color:var(--yellow);border-color:var(--yellow-bd)}
.p-low{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}
.a-smartcontract{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-bd)}
.a-backend{background:var(--teal-bg);color:var(--teal);border-color:var(--teal-bd)}
.a-frontend{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}
.a-gamemechanics{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.a-design{background:var(--orange-bg);color:var(--orange);border-color:var(--orange-bd)}
.s-open{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.s-inprogress{background:var(--yellow-bg);color:var(--yellow);border-color:var(--yellow-bd)}
.s-done{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.s-blocked{background:var(--orange-bg);color:var(--orange);border-color:var(--orange-bd)}
.s-todo{background:var(--bg2);color:var(--text2);border-color:var(--border)}
.s-testing{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-bd)}
.av-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2px 8px}
.date-chip{font-family:var(--mono);font-size:10px;color:var(--text3)}
.reporter-chip{font-size:11px;color:var(--text3)}

/* LAUNCH */
.cl-section{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);margin-bottom:10px}
.cl-section-head{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg);cursor:pointer;user-select:none}
.cs-icon{font-size:15px;flex-shrink:0}
.cs-name{font-size:13px;font-weight:600}
.cs-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.prog-bar{width:72px;height:4px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
.cs-pct{font-family:var(--mono);font-size:10px;color:var(--text3);width:26px;text-align:right}
.cs-chev{font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.cs-chev.open{transform:rotate(90deg)}
.cl-items{display:none;padding:4px 8px 8px}
.cl-items.open{display:block}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:6px;transition:background .12s;cursor:pointer}
.cl-item:hover{background:var(--bg)}
.cl-cb{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border2);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px;transition:all .15s}
.cl-cb.checked{background:var(--green);border-color:var(--green);color:#fff}
.cl-content{flex:1;min-width:0}
.cl-title{font-size:13px;font-weight:500;transition:color .15s}
.cl-item.checked .cl-title{text-decoration:line-through;color:var(--text3)}
.cl-meta{display:flex;align-items:center;gap:7px;margin-top:3px;flex-wrap:wrap}
.must-ship{font-size:10px;font-weight:600;color:var(--red);background:var(--red-bg);border:1px solid var(--red-bd);padding:1px 6px;border-radius:4px}
.nice-have{font-size:10px;color:var(--text3);background:var(--bg2);border:1px solid var(--border);padding:1px 6px;border-radius:4px}
.cl-owner{font-size:11px;color:var(--text3);font-family:var(--mono)}
.cl-add-row{display:flex;gap:7px;padding:8px 10px;border-top:1px solid var(--border);margin-top:4px}
.cl-add-row input{flex:1;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-family:var(--sans);font-size:13px;background:var(--bg);outline:none;color:var(--text)}
.cl-add-row input:focus{border-color:var(--border2);background:var(--white)}
.cl-add-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--white);font-family:var(--sans);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap}
.cl-add-btn:hover{background:var(--bg2);color:var(--text)}

/* ADD TRIGGER */
.add-trigger{display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:6px;border:1.5px dashed var(--border2);background:transparent;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
.add-trigger:hover{border-color:var(--border);background:var(--white);color:var(--text)}
.add-trigger.cancel{border-style:solid;border-color:var(--border);color:var(--text3)}
.empty{text-align:center;padding:44px 20px;color:var(--text3);font-size:13px;line-height:2}
.empty-icon{font-size:26px;margin-bottom:8px;opacity:.3}
</style>
</head>
<body>
<div class="app">

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt" id="loading-txt">Connecting to shared board...</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <div class="brand-dot"></div>
    <span class="brand-name">Micro.fun Board</span>
  </div>
  <div class="nav">
    <button class="nav-btn on" data-view="bugs" onclick="switchView(this)">🐛 Bugs <span class="nav-count" id="nc-bugs">0</span></button>
    <button class="nav-btn" data-view="backlog" onclick="switchView(this)">📋 Backlog <span class="nav-count" id="nc-backlog">0</span></button>
    <button class="nav-btn" data-view="launch" onclick="switchView(this)">🚀 Launch <span class="nav-count" id="nc-launch">0%</span></button>
  </div>
  <div class="topbar-right">
    <div class="online-wrap">
      <span class="online-label">Online:</span>
      <div class="avatars" id="avatars"></div>
    </div>
    <div class="sync-row">
      <div class="sync-dot" id="sync-dot"></div>
      <span class="sync-label" id="sync-label">synced</span>
    </div>
    <div class="user-pill">
      <span class="user-lbl">You:</span>
      <input type="text" id="userName" placeholder="Your name" oninput="onUserInput()">
    </div>
    <button class="icon-btn" onclick="forceSync()">↻ Sync</button>
    <button class="icon-btn" onclick="exportJSON()">Export</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- BUGS -->
  <div class="view on" id="view-bugs">
    <div class="page-head">
      <div><div class="page-title">Bug Tracker</div><div class="page-sub">Log, prioritize and resolve testnet bugs.</div></div>
      <div class="head-right">
        <button class="add-trigger" id="bug-trigger" onclick="toggleForm('bug-form','bug-trigger','+ Report Bug')">+ Report Bug</button>
      </div>
    </div>
    <div class="stats-row" id="bug-stats"></div>
    <div class="add-form" id="bug-form">
      <div class="fr c2">
        <div class="fg"><label>Title *</label><input id="bf-title" placeholder="Short description of the bug"></div>
        <div class="fg"><label>Reported by</label><input id="bf-reporter" placeholder="Your name"></div>
      </div>
      <div class="fr">
        <div class="fg"><label>Steps to reproduce / Description</label><textarea id="bf-desc" placeholder="What happened? How to reproduce it?"></textarea></div>
      </div>
      <div class="fr c4">
        <div class="fg"><label>Priority</label>
          <select id="bf-priority"><option value="critical">🔴 Critical</option><option value="high">🟠 High</option><option value="medium" selected>🟡 Medium</option><option value="low">🔵 Low</option></select>
        </div>
        <div class="fg"><label>Area</label>
          <select id="bf-area"><option value="smartcontract">Smart Contract</option><option value="backend">Backend</option><option value="frontend">Frontend</option><option value="gamemechanics">Game Mechanics</option><option value="design">Design</option></select>
        </div>
        <div class="fg"><label>Status</label>
          <select id="bf-status"><option value="open">Open</option><option value="inprogress">In Progress</option><option value="blocked">Blocked</option><option value="done">Done</option></select>
        </div>
        <div class="fg"><label>Assigned to</label><input id="bf-assignee" placeholder="Name"></div>
      </div>
      <div class="form-acts">
        <button class="btn btn-ghost" onclick="toggleForm('bug-form','bug-trigger','+ Report Bug')">Cancel</button>
        <button class="btn btn-primary" onclick="addBug()">Add Bug</button>
      </div>
    </div>
    <div class="filter-bar" id="bug-filter-bar">
      <button class="fb on" data-f="all" onclick="setFilter('bug',this)">All</button>
      <button class="fb" data-f="critical" onclick="setFilter('bug',this)">🔴 Critical</button>
      <button class="fb" data-f="high" onclick="setFilter('bug',this)">🟠 High</button>
      <button class="fb" data-f="medium" onclick="setFilter('bug',this)">🟡 Medium</button>
      <button class="fb" data-f="low" onclick="setFilter('bug',this)">🔵 Low</button>
      <button class="fb" data-f="open" onclick="setFilter('bug',this)">Open</button>
      <button class="fb" data-f="inprogress" onclick="setFilter('bug',this)">In Progress</button>
      <button class="fb" data-f="done" onclick="setFilter('bug',this)">Done</button>
      <div class="search-wrap"><span class="s-icon">🔍</span><input placeholder="Search..." oninput="renderBugs()" id="bug-search"></div>
    </div>
    <div class="items-list" id="bugs-list"></div>
  </div>

  <!-- BACKLOG -->
  <div class="view" id="view-backlog">
    <div class="page-head">
      <div><div class="page-title">Backlog</div><div class="page-sub">Tasks, features and improvements to build.</div></div>
      <div class="head-right">
        <button class="add-trigger" id="bl-trigger" onclick="toggleForm('bl-form','bl-trigger','+ Add Item')">+ Add Item</button>
      </div>
    </div>
    <div class="stats-row" id="bl-stats"></div>
    <div class="add-form" id="bl-form">
      <div class="fr c2">
        <div class="fg"><label>Title *</label><input id="bl-title" placeholder="What needs to be built?"></div>
        <div class="fg"><label>Assigned to</label><input id="bl-assignee" placeholder="Name"></div>
      </div>
      <div class="fr">
        <div class="fg"><label>Description</label><textarea id="bl-desc" placeholder="Details, acceptance criteria, notes..."></textarea></div>
      </div>
      <div class="fr c4">
        <div class="fg"><label>Priority</label>
          <select id="bl-priority"><option value="critical">🔴 Critical</option><option value="high">🟠 High</option><option value="medium" selected>🟡 Medium</option><option value="low">🔵 Low</option></select>
        </div>
        <div class="fg"><label>Area</label>
          <select id="bl-area"><option value="smartcontract">Smart Contract</option><option value="backend">Backend</option><option value="frontend">Frontend</option><option value="gamemechanics">Game Mechanics</option><option value="design">Design</option></select>
        </div>
        <div class="fg"><label>Status</label>

// ─── JSONBIN API ───────────────────────────────────────────────────────────
async function createBin() {
  const res = await fetch(`${BASE_URL}/b`, {
    method:'POST',
    headers:{'Content-Type':'application/json','X-Access-Key':API_KEY,'X-Bin-Name':BIN_NAME,'X-Bin-Private':'false'},
    body: JSON.stringify({ bugs:[], backlog:[], launch: DEFAULT_LAUNCH, presence:{} })
  });
  const data = await res.json();
  binId = data.metadata?.id;
  localStorage.setItem('mf_bin_id', binId);
  return binId;
}

async function readBin() {
  if(!binId) return null;
  const res = await fetch(`${BASE_URL}/b/${binId}/latest`, {
    headers:{'X-Access-Key':API_KEY}
  });
  if(!res.ok) return null;
  const data = await res.json();
  return data.record;
}

async function writeBin(record) {
  if(!binId) return;
  await fetch(`${BASE_URL}/b/${binId}`, {
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Access-Key':API_KEY},
    body: JSON.stringify(record)
  });
}

// ─── SYNC ──────────────────────────────────────────────────────────────────
function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if(status==='syncing'){ dot.className='sync-dot syncing'; lbl.textContent='syncing...'; }
  else if(status==='saved'){ dot.className='sync-dot'; lbl.textContent='saved'; }
  else if(status==='error'){ dot.className='sync-dot err'; lbl.textContent='error'; }
  else { dot.className='sync-dot'; lbl.textContent='synced'; }
}

async function pushData() {
  if(!binId || isSaving) return;
  isSaving = true; setSyncStatus('syncing');
  try {
    const current = await readBin();
    const presence = current?.presence || {};
    await writeBin({ bugs: db.bugs, backlog: db.backlog, launch: db.launch, presence });
    setSyncStatus('saved');
    setTimeout(()=>setSyncStatus('synced'), 1500);
  } catch(e) { setSyncStatus('error'); showToast('Sync failed — check connection'); }
  isSaving = false;
}

async function pullData() {
  if(!binId) return;
  setSyncStatus('syncing');
  try {
    const record = await readBin();
    if(record) {
      db.bugs    = record.bugs    || [];
      db.backlog = record.backlog || [];
      db.launch  = record.launch  || DEFAULT_LAUNCH;
      renderAll();
      updatePresenceUI(record.presence || {});
    }
    setSyncStatus('synced');
  } catch(e) { setSyncStatus('error'); }
}

async function forceSync() { await pullData(); showToast('Board refreshed'); }

function schedulePush() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushData, 800);
}

// ─── PRESENCE (who's online) ───────────────────────────────────────────────
const AVATAR_COLORS = ['#1B6EF3','#0BA552','#6B47DC','#D4620A','#0A7B8C','#C5280C','#92610A'];
function nameToColor(name){ let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))%AVATAR_COLORS.length; return AVATAR_COLORS[h]; }
function nameInitials(name){ return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?'; }

async function updatePresence() {
  if(!binId || !userName) return;
  try {
    const current = await readBin();
    const presence = current?.presence || {};
    presence[userName] = Date.now();
    // clean stale (>60s)
    const now = Date.now();
    Object.keys(presence).forEach(k=>{ if(now - presence[k] > 60000) delete presence[k]; });
    await writeBin({ bugs: db.bugs, backlog: db.backlog, launch: db.launch, presence });
    updatePresenceUI(presence);
  } catch{}
}

function updatePresenceUI(presence) {
  const now = Date.now();
  const online = Object.entries(presence).filter(([,ts])=> now - ts < 60000).map(([name])=>name);
  const el = document.getElementById('avatars');
  el.innerHTML = online.map(name =>
    `<div class="av" style="background:${nameToColor(name)}" title="${name}">${nameInitials(name)}</div>`
  ).join('');
}

// ─── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  document.getElementById('loading').classList.remove('hide');
  document.getElementById('loading-txt').textContent = 'Connecting to shared board...';

  if(userName) document.getElementById('userName').value = userName;

  try {
    if(!binId) {
      // Search for existing bin by name
      document.getElementById('loading-txt').textContent = 'Looking up board...';
      const searchRes = await fetch(`${BASE_URL}/b?page=1&count=10`, { headers:{'X-Access-Key':API_KEY} });
      const searchData = await searchRes.json().catch(()=>null);
      if(searchData && Array.isArray(searchData)) {
        const found = searchData.find(b=>b.metadata?.name === BIN_NAME);
        if(found) { binId = found.metadata.id; localStorage.setItem('mf_bin_id', binId); }
      }
      if(!binId) {
        document.getElementById('loading-txt').textContent = 'Creating shared board...';
        await createBin();
      }
    }
    document.getElementById('loading-txt').textContent = 'Loading data...';
    await pullData();
  } catch(e) {
    // Fallback to local defaults
    db.bugs=[]; db.backlog=[]; db.launch=JSON.parse(JSON.stringify(DEFAULT_LAUNCH));
    renderAll();
    showToast('Running in offline mode');
  }

  document.getElementById('loading').classList.add('hide');

  // Auto-sync every 15s
  setInterval(pullData, 15000);
  // Presence every 20s
  if(userName) { updatePresence(); presenceTimer = setInterval(updatePresence, 20000); }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function today(){ return new Date().toISOString().slice(0,10); }
function pLabel(p){ return {critical:'🔴 Critical',high:'🟠 High',medium:'🟡 Medium',low:'🔵 Low'}[p]||p; }
function aLabel(a){ return {smartcontract:'Smart Contract',backend:'Backend',frontend:'Frontend',gamemechanics:'Game Mechanics',design:'Design'}[a]||a; }
function sLabel(s){ return {open:'Open',inprogress:'In Progress',done:'Done',blocked:'Blocked',todo:'To Do',testing:'Testing'}[s]||s; }

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

function switchView(btn){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('view-'+btn.dataset.view).classList.add('on');
}

function toggleForm(fid, tid, openLabel){
  const f=document.getElementById(fid), t=document.getElementById(tid);
  const open=f.classList.toggle('open');
  t.textContent = open ? '✕ Cancel' : openLabel;
  t.className = open ? 'add-trigger cancel' : 'add-trigger';
}

function setFilter(type, btn){
  const bar = type==='bug' ? '#bug-filter-bar' : '#bl-filter-bar';
  document.querySelectorAll(bar+' .fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(type==='bug') bugFilter=btn.dataset.f;
  else blFilter=btn.dataset.f;
  type==='bug' ? renderBugs() : renderBacklog();
}

function onUserInput(){
  userName = document.getElementById('userName').value.trim();
  localStorage.setItem('mf_user', userName);
  clearInterval(presenceTimer);
  if(userName){ updatePresence(); presenceTimer=setInterval(updatePresence,20000); }
}

function renderAll(){ renderBugs(); renderBacklog(); renderLaunch(); updateNavCounts(); }

// ─── BUGS ──────────────────────────────────────────────────────────────────
function addBug(){
  const title=document.getElementById('bf-title').value.trim();
  if(!title){ alert('Enter a bug title.'); return; }
  db.bugs.unshift({
    id:uid(), title,
    desc:     document.getElementById('bf-desc').value.trim(),
    priority: document.getElementById('bf-priority').value,
    area:     document.getElementById('bf-area').value,
    status:   document.getElementById('bf-status').value,
    assignee: document.getElementById('bf-assignee').value.trim()||userName,
    reporter: document.getElementById('bf-reporter').value.trim()||userName,
    date:today(), done:false
  });
  ['bf-title','bf-desc','bf-assignee','bf-reporter'].forEach(id=>document.getElementById(id).value='');
  toggleForm('bug-form','bug-trigger','+ Report Bug');
  renderBugs(); updateNavCounts(); schedulePush();
  showToast('Bug reported');
}

function renderBugs(){
  const q=(document.getElementById('bug-search').value||'').toLowerCase();
  const list=db.bugs.filter(b=>{
    if(bugFilter!=='all'&&b.priority!==bugFilter&&b.status!==bugFilter) return false;
    if(q&&!b.title.toLowerCase().includes(q)&&!(b.desc||'').toLowerCase().includes(q)) return false;
    return true;
  });
  const el=document.getElementById('bugs-list');
  if(!list.length){ el.innerHTML='<div class="empty"><div class="empty-icon">🐛</div>No bugs match. Keep testing!</div>'; updateBugStats(); return; }
  el.innerHTML='';
  list.forEach(b=>{
    const d=document.createElement('div');
    d.className='item-card'+(b.done?' done-card':'');
    d.innerHTML=`
      <div class="item-check ${b.done?'checked':''}" onclick="toggleBugDone('${b.id}')">${b.done?'✓':''}</div>
      <div class="il">
        <div class="item-top">
          <span class="item-id">#${b.id.slice(-4).toUpperCase()}</span>
          <span class="item-title">${b.title}</span>
        </div>
        ${b.desc?`<div class="item-desc">${b.desc}</div>`:''}
        <div class="item-meta">
          <span class="badge p-${b.priority}">${pLabel(b.priority)}</span>
          <span class="badge a-${b.area}">${aLabel(b.area)}</span>
          <span class="badge s-${b.status}">${sLabel(b.status)}</span>
          ${b.assignee?`<span class="av-chip">→ ${b.assignee}</span>`:''}
          ${b.reporter?`<span class="reporter-chip">by ${b.reporter}</span>`:''}
          <span class="date-chip">${b.date}</span>
        </div>
      </div>
      <div class="ir">
        <select class="isel" onchange="changeBugStatus('${b.id}',this.value)">
          ${['open','inprogress','blocked','done'].map(s=>`<option value="${s}"${b.status===s?' selected':''}>${sLabel(s)}</option>`).join('')}
        </select>
        <button class="item-del" onclick="deleteBug('${b.id}')">×</button>
      </div>`;
    el.appendChild(d);
  });
  updateBugStats();
}

function toggleBugDone(id){ const b=db.bugs.find(x=>x.id===id); if(b){b.done=!b.done;b.status=b.done?'done':b.status==='done'?'open':b.status;} renderBugs();updateNavCounts();schedulePush(); }
function changeBugStatus(id,v){ const b=db.bugs.find(x=>x.id===id); if(b){b.status=v;b.done=v==='done';} renderBugs();updateNavCounts();schedulePush(); }
function deleteBug(id){ if(!confirm('Delete this bug?'))return; db.bugs=db.bugs.filter(x=>x.id!==id); renderBugs();updateNavCounts();schedulePush();showToast('Bug deleted'); }

function updateBugStats(){
  const el=document.getElementById('bug-stats');
  const total=db.bugs.length, done=db.bugs.filter(b=>b.done||b.status==='done').length;
  const crit=db.bugs.filter(b=>b.priority==='critical'&&b.status!=='done').length;
  const inp=db.bugs.filter(b=>b.status==='inprogress').length;
  el.innerHTML=`
    <div class="stat"><div class="stat-v">${total}</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--red)">${crit}</div><div class="stat-l">Critical</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--yellow)">${inp}</div><div class="stat-l">In Progress</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--green)">${done}</div><div class="stat-l">Resolved</div></div>`;
}

    id:uid(), title,

    priority: document.getElementById('bl-priority').value,
    area:     document.getElementById('bl-area').value,
    status:   document.getElementById('bl-status').value,
    assignee: document.getElementById('bl-assignee').value.trim()||userName,
    due:      document.getElementById('bl-due').value,
    date:today(), done:false
  });
  ['bl-title','bl-desc','bl-assignee','bl-due'].forEach(id=>document.getElementById(id).value='');
  toggleForm('bl-form','bl-trigger','+ Add Item');
  renderBacklog();updateNavCounts();schedulePush();
  showToast('Item added to backlog');
}

function renderBacklog(){
  const q=(document.getElementById('bl-search').value||'').toLowerCase();
  const list=db.backlog.filter(b=>{
    if(blFilter!=='all'&&b.priority!==blFilter&&b.area!==blFilter&&b.status!==blFilter) return false;
    if(q&&!b.title.toLowerCase().includes(q)&&!(b.desc||'').toLowerCase().includes(q)) return false;
    return true;
  });
  const el=document.getElementById('backlog-list');
  if(!list.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>No backlog items yet.</div>'; updateBlStats(); return; }
  el.innerHTML='';
  list.forEach(b=>{
    const d=document.createElement('div');
    d.className='item-card'+(b.done?' done-card':'');
    d.innerHTML=`
      <div class="item-check ${b.done?'checked':''}" onclick="toggleBlDone('${b.id}')">${b.done?'✓':''}</div>
      <div class="il">
        <div class="item-top">
          <span class="item-id">#${b.id.slice(-4).toUpperCase()}</span>
          <span class="item-title">${b.title}</span>
        </div>
        ${b.desc?`<div class="item-desc">${b.desc}</div>`:''}
        <div class="item-meta">
          <span class="badge p-${b.priority}">${pLabel(b.priority)}</span>
          <span class="badge a-${b.area}">${aLabel(b.area)}</span>
          <span class="badge s-${b.status}">${sLabel(b.status)}</span>
          ${b.assignee?`<span class="av-chip">→ ${b.assignee}</span>`:''}
          ${b.due?`<span class="date-chip">Due ${b.due}</span>`:''}
        </div>
      </div>
      <div class="ir">
        <select class="isel" onchange="changeBlStatus('${b.id}',this.value)">
          ${['todo','inprogress','testing','done'].map(s=>`<option value="${s}"${b.status===s?' selected':''}>${sLabel(s)}</option>`).join('')}
        </select>
        <button class="item-del" onclick="deleteBacklog('${b.id}')">×</button>
      </div>`;
    el.appendChild(d);
  });
  updateBlStats();
}

function toggleBlDone(id){ const b=db.backlog.find(x=>x.id===id); if(b){b.done=!b.done;b.status=b.done?'done':b.status==='done'?'todo':b.status;} renderBacklog();updateNavCounts();schedulePush(); }
function changeBlStatus(id,v){ const b=db.backlog.find(x=>x.id===id); if(b){b.status=v;b.done=v==='done';} renderBacklog();updateNavCounts();schedulePush(); }
function deleteBacklog(id){ if(!confirm('Delete this item?'))return; db.backlog=db.backlog.filter(x=>x.id!==id); renderBacklog();updateNavCounts();schedulePush();showToast('Item deleted'); }

function updateBlStats(){
  const el=document.getElementById('bl-stats');
  const total=db.backlog.length,done=db.backlog.filter(b=>b.done).length;
  const inp=db.backlog.filter(b=>b.status==='inprogress').length;
  const crit=db.backlog.filter(b=>b.priority==='critical'&&!b.done).length;
  el.innerHTML=`
    <div class="stat"><div class="stat-v">${total}</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--red)">${crit}</div><div class="stat-l">Critical</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--yellow)">${inp}</div><div class="stat-l">In Progress</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--green)">${done}</div><div class="stat-l">Done</div></div>`;
}

function renderLaunch(){
  const container=document.getElementById('launch-sections');
  container.innerHTML='';
  let totalItems=0,totalDone=0;
  Object.entries(db.launch).forEach(([section,data])=>{
    const items=data.items||[];
    const done=items.filter(i=>i.done).length;
    totalItems+=items.length; totalDone+=done;
    const pct=items.length?Math.round(done/items.length*100):0;
    const secId='sec-'+section.replace(/\W/g,'_');
    const wrap=document.createElement('div');
    wrap.className='cl-section';
    wrap.innerHTML=`
      <div class="cl-section-head" onclick="toggleSection('${secId}',this)">
        <span class="cs-icon">${data.icon||'📌'}</span>
        <span class="cs-name">${section}</span>
        <div class="cs-right">
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
          <span class="cs-pct">${pct}%</span>
        </div>
        <span class="cs-chev open">›</span>
      </div>
      <div class="cl-items open" id="${secId}">
        ${items.map(item=>`
          <div class="cl-item ${item.done?'checked':''}" onclick="toggleLaunchItem('${section}','${item.id}')">
            <div class="cl-cb ${item.done?'checked':''}">${item.done?'✓':''}</div>
            <div class="cl-content">
              <div class="cl-title">${item.title}</div>
              <div class="cl-meta">
                ${item.critical?'<span class="must-ship">Must ship</span>':'<span class="nice-have">Nice to have</span>'}
                ${item.owner?`<span class="cl-owner">→ ${item.owner}</span>`:''}
              </div>
            </div>
          </div>`).join('')}
        <div class="cl-add-row">
          <input placeholder="Add item..." id="cl-${secId}" onkeydown="if(event.key==='Enter')addLaunchItem('${section}','${secId}')">
          <button class="cl-add-btn" onclick="addLaunchItem('${section}','${secId}')">+ Add</button>
        </div>
      </div>`;
    container.appendChild(wrap);
  });
  const pct=totalItems?Math.round(totalDone/totalItems*100):0;
  document.getElementById('launch-pct').textContent=`${totalDone}/${totalItems} · ${pct}% complete`;
  updateLaunchStats(totalItems,totalDone);
}

function toggleSection(id,head){
  const el=document.getElementById(id);
  const chev=head.querySelector('.cs-chev');
  el.classList.toggle('open'); chev.classList.toggle('open');
}

function toggleLaunchItem(section,itemId){
  const item=db.launch[section]?.items?.find(i=>i.id===itemId);
  if(item) item.done=!item.done;
  renderLaunch();updateNavCounts();schedulePush();
}

function addLaunchItem(section,secId){
  const inp=document.getElementById('cl-'+secId);
  const val=inp?.value?.trim(); if(!val) return;
  if(!db.launch[section]) db.launch[section]={icon:'📌',items:[]};
  db.launch[section].items.push({id:uid(),title:val,critical:false,done:false,owner:''});
  renderLaunch();schedulePush();showToast('Item added');
}

function updateLaunchStats(total,done){
  const critical=Object.values(db.launch).flatMap(d=>d.items||[]).filter(i=>i.critical&&!i.done).length;
  document.getElementById('launch-stats').innerHTML=`
    <div class="stat"><div class="stat-v">${total}</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--red)">${critical}</div><div class="stat-l">Must Ship Left</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--yellow)">${total-done}</div><div class="stat-l">Remaining</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--green)">${done}</div><div class="stat-l">Complete</div></div>`;
}

// ─── NAV COUNTS ────────────────────────────────────────────────────────────
function updateNavCounts(){
  document.getElementById('nc-bugs').textContent    = db.bugs.filter(b=>!b.done).length;
  document.getElementById('nc-backlog').textContent = db.backlog.filter(b=>!b.done).length;
  const allItems=Object.values(db.launch).flatMap(d=>d.items||[]);
  const pct=allItems.length?Math.round(allItems.filter(i=>i.done).length/allItems.length*100):0;
  document.getElementById('nc-launch').textContent  = pct+'%';
}

// ─── EXPORT ────────────────────────────────────────────────────────────────
function exportJSON(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify({bugs:db.bugs,backlog:db.backlog,launch:db.launch,exported:new Date().toISOString()},null,2)],{type:'application/json'}));
  a.download='microfun_board_'+today()+'.json'; a.click();
}

// ─── START ─────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
